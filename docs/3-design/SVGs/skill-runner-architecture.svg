<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">SkillRunner 可插拔审查架构图</title>
  <desc id="desc">展示需求审查平台中前端、后端、SkillRunner、可插拔 Skills、评审上下文、缓存和报告的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2463eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .band{fill:#e0f2fe;stroke:#0f75bc;stroke-width:2}
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}
      .runner{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}
      .skill{fill:#ecfdf5;stroke:#059669;stroke-width:1.5}
      .ctx{fill:#fff7ed;stroke:#ea580c;stroke-width:1.5}
      .store{fill:#fefce8;stroke:#ca8a04;stroke-width:1.5}
      .future{fill:#fdf2f8;stroke:#db2777;stroke-width:1.5;stroke-dasharray:7 5}
      .title{font:700 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
      .h{font:700 16px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}
      .t{font:13px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}
      .small{font:12px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}
      .line{stroke:#2463eb;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1180" height="660" rx="18"/>
  <text x="40" y="42" class="title">需求审查平台：SkillRunner 可插拔架构</text>
  <text x="40" y="70" class="small">模式只决定编排路径，Skills 保持独立、可替换、可升级；ReviewContext 与缓存由 Runner 统一注入和管理。</text>

  <rect x="40" y="105" width="210" height="130" rx="14" class="panel"/>
  <text x="64" y="138" class="h">前端工作台</text>
  <text x="64" y="166" class="t">三栏 UI</text>
  <text x="64" y="190" class="t">六种审查模式</text>
  <text x="64" y="214" class="t">SSE 进度和结果 Tab</text>

  <rect x="310" y="105" width="220" height="130" rx="14" class="band"/>
  <text x="334" y="138" class="h">FastAPI 审查服务</text>
  <text x="334" y="166" class="t">项目/文档/任务 API</text>
  <text x="334" y="190" class="t">权限、审计、状态收口</text>
  <text x="334" y="214" class="t">DOCX 上传 / 历史文档导入</text>

  <rect x="585" y="90" width="260" height="205" rx="18" class="runner"/>
  <text x="615" y="125" class="h">SkillRunner 编排层</text>
  <text x="615" y="154" class="t">1. 按模式选择 Skills 组合</text>
  <text x="615" y="178" class="t">2. 注入项目级 ReviewContext</text>
  <text x="615" y="202" class="t">3. 按上下文版本和文档范围复用缓存</text>
  <text x="615" y="226" class="t">4. 支持取消、失败和部分结果收口</text>
  <text x="615" y="250" class="t">5. 统一结构化结果和报告输入</text>
  <text x="615" y="274" class="small">未来：交给 pi-agent 进行用户自定义编排</text>

  <rect x="910" y="80" width="210" height="250" rx="14" class="skill"/>
  <text x="934" y="112" class="h">可插拔 Skills</text>
  <text x="934" y="142" class="t">Skill 1 DOCX 转 MD</text>
  <text x="934" y="166" class="t">Skill 2 分类和版本链</text>
  <text x="934" y="190" class="t">Skill 3 逐篇分析</text>
  <text x="934" y="214" class="t">Skill 4 七维体系 Review</text>
  <text x="934" y="238" class="t">Skill 5 洞察和缺口</text>
  <text x="934" y="262" class="t">Skill 6 报告生成</text>
  <text x="934" y="300" class="small">每个 Skill 可独立升级 prompt、schema、脚本</text>

  <rect x="90" y="365" width="250" height="150" rx="14" class="ctx"/>
  <text x="116" y="398" class="h">ReviewContext</text>
  <text x="116" y="426" class="t">需求规范、专业指导意见</text>
  <text x="116" y="450" class="t">历史文档、评分量规</text>
  <text x="116" y="474" class="t">项目上下文版本绑定</text>
  <text x="116" y="498" class="small">规范变更后旧缓存不再误用</text>

  <rect x="410" y="365" width="250" height="150" rx="14" class="store"/>
  <text x="436" y="398" class="h">数据和缓存</text>
  <text x="436" y="426" class="t">review_documents</text>
  <text x="436" y="450" class="t">review_tasks / analyses</text>
  <text x="436" y="474" class="t">system_reviews / reports</text>
  <text x="436" y="498" class="small">按用户、项目、任务、上下文隔离</text>

  <rect x="730" y="365" width="350" height="150" rx="14" class="future"/>
  <text x="758" y="398" class="h">Agent/API/CLI 对接层（规划）</text>
  <text x="758" y="426" class="t">飞书、群聊、外部知识库、企业工作流</text>
  <text x="758" y="450" class="t">每个板块开放 API 或 CLI 指令</text>
  <text x="758" y="474" class="t">智能体可调用导入、审查、对话和导出</text>
  <text x="758" y="498" class="small">pi-agent 负责跨 Skills 和跨 Channel 编排</text>

  <path class="line" d="M250 170 H310"/>
  <path class="line" d="M530 170 H585"/>
  <path class="line" d="M845 170 H910"/>
  <path class="line" d="M220 365 C280 320, 560 320, 650 295"/>
  <path class="line" d="M535 365 C560 330, 625 315, 675 295"/>
  <path class="line" d="M845 245 C905 310, 905 330, 905 365"/>
  <path class="line" d="M845 130 C885 110, 895 105, 910 105"/>
  <path class="line" d="M730 440 C650 440, 600 385, 725 295"/>
</svg>
